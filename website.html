<!DOCTYPE html>
    <head>
        <title>Room B reservation</title>
        <link rel="stylesheet" href="stylesheet.css">
    </head>
    <body>
        <h1>Common Room B</h1>

        <hr>
        
        <main id="input_container">

            <form id="reservationForm">

                <label for="username">Name</label>
                <input type="text" id="username" required placeholder="your name here">

                <label for="date">Date</label>
                <input type="date" id="date" required>

                <label for="timeFrom">From</label>
                <input type="time" id="timeFrom" value="18:00">

                <label for="timeTill">Until</label>
                <input type="time" id="timeTill" value="23:00">

                <button type="submit">Reserve</button>
                
            </form>

        </main>
        <aside id="list_display">
            <h2>Current reservations</h2>

            <ul id="reservationList"></ul>
        </aside>
        <script type='module' src="JavaScript.js"></script>

    </body>
</html>
