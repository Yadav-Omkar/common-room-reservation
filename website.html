<!DOCTYPE html>
    <head>
        <title>Room B reservation</title>
        <link rel="stylesheet" href="stylesheet.css">
    </head>
    <body>
        <h1>Common Room B</h1>

        <hr>
        <div class='envelope'>

            <div class="layout">
                
                <main id="input_container">

                    <form id="reservationForm">

                        <div class="form_item">
                            <label for="username">Name</label><br>
                            <input type="text" id="username" required placeholder="your name here">
                        </div>

                        <div class="form_item">
                            <label for="date">Date</label><br>
                            <input type="date" id="date" required>
                        </div>

                        <div class="form_item">
                            <label for="timeFrom">From</label><br>
                            <input type="time" id="timeFrom" step="60" value="18:00">
                        </div> 

                        <div class="form_item">
                            <label for="timeTill">Until</label><br>
                            <input type="time" id="timeTill" step="60" value="23:00">
                        </div>

                        <button type="submit">Reserve</button>
                        
                    </form>

                </main>
                <aside id="list_display">
                    <h2>Current reservations</h2>

                    <ul id="reservationList"></ul>
                </aside>
                <script type='module' src="JavaScript.js"></script>

            </div>
            
        </div>
    </body>
</html>
